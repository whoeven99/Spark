# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "940b967eda872dd81f9ffc283e29a013"
name = "AiAssistant-Test"
application_url = "https://aiassistant-wi7b.onrender.com/app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/purchases_one_time_update"
  topics = [ "app_purchases_one_time/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/subscriptions_update"
  topics = [ "app_subscriptions/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_content,read_customer_events,read_fulfillments,read_inventory,read_locales,read_locations,read_orders,read_pixels,read_products,read_translations,write_app_proxy,write_pixels,write_products,write_translations"

[auth]
redirect_urls = [
  "https://aiassistant-wi7b.onrender.com/auth/callback",
  "https://aiassistant-wi7b.onrender.com/auth/shopify/callback"
]

[app_proxy]
# 必须用 /a/ciwi-spark（非 /app/a/...）；Shopify 会附带 shop/signature 等 query
url = "https://aiassistant-wi7b.onrender.com/a/ciwi-spark"
subpath = "ciwi-spark"
prefix = "a"
