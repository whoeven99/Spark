name: spark - Shopify App Deploy (Test)

on:
  push:
    branches:
      - allen
  workflow_dispatch:

defaults:
  run:
    working-directory: .

jobs:
  sync_turso_schema:
    name: Sync Turso schema baseline
    runs-on: ubuntu-latest
    environment: CommonShopifyRenderConfig

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Install Turso CLI
        run: |
          curl -sSfL https://get.tur.so/install.sh | bash
          echo "$HOME/.turso/bin" >> "$GITHUB_PATH"

      - name: Login Turso CLI
        env:
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
        run: turso auth login --token "$TURSO_API_TOKEN"

      - name: Apply baseline schema to Turso
        env:
          TURSO_DATABASE_NAME: ${{ secrets.TURSO_DATABASE_NAME }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
        run: |
          DB_NAME="$TURSO_DATABASE_NAME"
          if [ -z "$DB_NAME" ] && [ -n "$TURSO_DATABASE_URL" ]; then
            DB_NAME="$(echo "$TURSO_DATABASE_URL" | sed -E 's#^libsql://([^.]+)\..*$#\1#')"
          fi
          if [ -z "$DB_NAME" ]; then
            echo "Missing secret: TURSO_DATABASE_NAME (or TURSO_DATABASE_URL)"
            exit 1
          fi
          turso db shell "$DB_NAME" < prisma/turso-baseline.sql
          turso db shell "$DB_NAME" "SELECT name FROM sqlite_master WHERE type='table' ORDER BY name;"

  deploy_shopify:
    name: Shopify app deploy (test.toml)
    runs-on: ubuntu-latest
    environment: CommonShopifyRenderConfig
    needs: sync_turso_schema

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Deploy
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
          # 与 shopify.app.test.toml 中 client_id 一致
          SHOPIFY_API_KEY: 940b967eda872dd81f9ffc283e29a013
        run: shopify app deploy -c shopify.app.test.toml -f

  deploy_render:
    name: Trigger Render deploy (Test)
    runs-on: ubuntu-latest
    environment: CommonShopifyRenderConfig
    needs: deploy_shopify

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 与本次要部署的代码一致；Render Create Deploy 对 branch 支持不可靠，下面用 commitId 触发
          ref: ${{ github.ref }}

      - name: Deploy to Render Test
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_APIKEY }}
          RENDER_SERVICE_ID: srv-d7j6ogaqqhas739in900
        run: |
          COMMIT="$(git rev-parse HEAD)"
          echo "Triggering Render deploy for commit: $COMMIT ($(git log -1 --oneline))"
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\": \"$COMMIT\"}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "Deploy to test Render triggered successfully. HTTP status: $RESPONSE"
          else
            echo "Failed to trigger deployment. HTTP status: $RESPONSE"
            cat response.json
            exit 1
          fi
