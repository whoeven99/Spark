# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "8191fdd554fc1ea1b10152aa6f7a0060"
name = "Spark-local"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = ["orders/paid"]
  uri = "/webhooks/orders/paid"

  [[webhooks.subscriptions]]
  topics = ["orders/cancelled"]
  uri = "/webhooks/orders/cancelled"

  [[webhooks.subscriptions]]
  topics = ["refunds/create"]
  uri = "/webhooks/refunds/create"

  [[webhooks.subscriptions]]
  topics = ["inventory_levels/update"]
  uri = "/webhooks/inventory_levels/update"

  [[webhooks.subscriptions]]
  topics = ["fulfillments/create"]
  uri = "/webhooks/fulfillments/create"

  [[webhooks.subscriptions]]
  topics = ["fulfillments/update"]
  uri = "/webhooks/fulfillments/update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,write_products,read_translations,write_translations,read_locales"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]
